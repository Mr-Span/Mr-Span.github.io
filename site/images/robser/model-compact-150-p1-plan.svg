    <g transform="translate(315 515)"><text font-size="13" font-weight="700">Vestibul</text><text y="19" font-size="12" fill="#65675f">hol + acces</text></g>
    <g transform="translate(469 435)"><text font-size="16" font-weight="700">Scară + hol</text><text y="22" font-size="13" fill="#65675f">parte din ~12 m²</text></g>
    <g transform="translate(420 548)"><text font-size="13" font-weight="700">Duș / WC</text><text y="19" font-size="12" fill="#65675f">~4 m²</text></g>

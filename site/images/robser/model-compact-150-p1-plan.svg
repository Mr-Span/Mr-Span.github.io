    <g transform="translate(209 318)"><text font-size="21" font-weight="700">Living + dining</text><text y="28" font-size="15" fill="#65675f">~34 m²</text></g>
    <g transform="translate(459 285)"><text font-size="19" font-weight="700">Bucătărie + cămară</text><text y="26" font-size="14" fill="#65675f">~15 m²</text></g>

    <rect x="630" y="202" width="502" height="408" fill="#f7f5f0"/>
    <rect x="630" y="202" width="260" height="188" fill="#ece9e1"/>
    <rect x="890" y="202" width="90" height="96" fill="#e4e1d8"/>
